<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolt App</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            transition: background-color 0.3s;
        }
        h1, h2, h3 {
            color: #333;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: white;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .container:hover {
            transform: scale(1.01);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Wolt App!</h1>
        <p>Experience the upgraded interface with modern design, better typography, animations, gamification elements, improved responsiveness, and better visual feedback.</p>
    </div>
</body>
</html>
