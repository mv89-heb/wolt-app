<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מחשבון מהיר - איוניק 2020</title>
    <style>
        :root {
            --wolt-blue: #00c2e8;
            --dark-gray: #202125;
            --light-gray: #f3f4f6;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --white: #ffffff;
        }

        /* מניעת זום אוטומטי בהקלדה בנייד */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--dark-gray); /* רקע כהה בחוץ כדי למקד את העין */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark-gray);
            touch-action: manipulation; /* מונע זום כפול בטעות */
        }

        .card {
            background: var(--white);
            width: 95%;
            max-width: 400px;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .input-box {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--wolt-blue);
        }

        /* שדות הקלדה ענקיים לגישה מהירה */
        input {
            width: 100%;
            padding: 15px;
            border: 3px solid #eef0f2;
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            background: #fdfdfd;
            transition: all 0.1s;
        }

        input:focus {
            border-color: var(--wolt-blue);
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 194, 232, 0.2);
        }

        #result-container {
            margin-top: 1rem;
            display: none;
        }

        .result-box {
            padding: 1rem;
            border-radius: 15px;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 0.5rem;
        }

        .stat-col {
            display: flex;
            flex-direction: column;
        }

        .final-profit {
            font-size: 2rem;
            font-weight: 900;
            margin-top: 5px;
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1rem;
            margin-top: 5px;
            font-weight: bold;
        }

        /* כפתור איפוס עצום */
        .reset-btn {
            width: 100%;
            background: #f1f3f4;
            color: #5f6368;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: background 0.2s;
        }

        .reset-btn:active {
            background: #e0e0e0;
        }

        /* סגנונות לפי מצב כדאיות */
        .status-good { background: #e8f8f0; color: var(--success); }
        .status-mid { background: #fff9e6; color: #b78a00; }
        .status-bad { background: #fef2f2; color: var(--danger); }
    </style>
</head>
<body>

<div class="card">
    
    <div class="input-box">
        <label for="fee">תשלום (₪)</label>
        <input type="number" id="fee" inputmode="decimal" placeholder="0" oninput="calculate()" onclick="this.select()" autofocus>
    </div>

    <div class="input-box">
        <label for="distance">מרחק (ק"מ)</label>
        <input type="number" id="distance" inputmode="decimal" placeholder="0" oninput="calculate()" onclick="this.select()">
    </div>

    <div id="result-container">
        <div id="result-box" class="result-box">
            <div class="stats">
                <div class="stat-col">
                    <span>דלק</span>
                    <strong id="fuel-val">₪0</strong>
                </div>
                <div class="stat-col">
                    <span>בלאי</span>
                    <strong id="maint-val">₪0</strong>
                </div>
            </div>
            <div class="final-profit" id="profit-val">₪0.00</div>
            <div id="status-badge" class="badge"></div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetApp()">נקה למשלוח הבא</button>

</div>

<script>
    function calculate() {
        const feeInput = document.getElementById('fee').value;
        const distanceInput = document.getElementById('distance').value;
        const container = document.getElementById('result-container');
        
        if (!feeInput || !distanceInput) {
            container.style.display = 'none';
            return;
        }

        const fee = parseFloat(feeInput);
        const distance = parseFloat(distanceInput);

        const fuelPrice = 8.0;      
        const kmPerLiter = 20;     
        const maintPerKm = 0.45;    

        const fuelCost = (distance / kmPerLiter) * fuelPrice;
        const maintCost = distance * maintPerKm;
        const totalExpenses = fuelCost + maintCost;
        const netProfit = fee - totalExpenses;

        document.getElementById('fuel-val').innerText = `₪${fuelCost.toFixed(1)}`;
        document.getElementById('maint-val').innerText = `₪${maintCost.toFixed(1)}`;
        document.getElementById('profit-val').innerText = `₪${netProfit.toFixed(1)}`;
        
        const box = document.getElementById('result-box');
        const badge = document.getElementById('status-badge');
        
        container.style.display = 'block'; 
        
        box.className = 'result-box';
        if (netProfit > (fee * 0.55)) {
            box.classList.add('status-good');
            badge.innerText = "לקחת!";
        } else if (netProfit > (fee * 0.25)) {
            box.classList.add('status-mid');
            badge.innerText = "סביר";
        } else {
            box.classList.add('status-bad');
            badge.innerText = "לדחות!";
        }
    }

    function resetApp() {
        document.getElementById('fee').value = '';
        document.getElementById('distance').value = '';
        document.getElementById('result-container').style.display = 'none';
        document.getElementById('fee').focus(); // מחזיר מיד את הסמן לשדה הראשון
    }
</script>

</body>
</html>
