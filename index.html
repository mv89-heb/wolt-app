<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wolt FastCalc - Ioniq 2020</title>
    <style>
        :root {
            --wolt-blue: #00c2e8;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #1a1a1b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: white;
            touch-action: manipulation;
        }

        .container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--wolt-blue);
        }

        input {
            background: #2d2d2f;
            border: 2px solid #3e3e41;
            border-radius: 12px;
            color: white;
            padding: 20px;
            font-size: 2.5rem;
            text-align: center;
            font-weight: 900;
            width: 100%;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--wolt-blue);
            outline: none;
            background: #38383a;
        }

        #result-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            margin-top: 10px;
            transition: all 0.2s;
            text-align: center;
        }

        .profit-val {
            font-size: 4rem;
            font-weight: 900;
        }

        .status-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .mini-stats {
            font-size: 1rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .reset-hint {
            font-size: 0.8rem;
            color: #666;
            margin-top: auto;
            padding-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<form class="container" onsubmit="return false;">
    <div class="input-group">
        <label>תשלום (₪)</label>
        <input type="number" id="fee" inputmode="decimal" enterkeyhint="next" placeholder="00">
    </div>

    <div class="input-group">
        <label>מרחק (ק"מ)</label>
        <input type="number" id="distance" inputmode="decimal" enterkeyhint="done" placeholder="0.0">
    </div>

    <div id="result-area">
        <div class="profit-val" id="profit-display">--</div>
        <div class="status-text" id="status-display">הזן נתונים</div>
        <div class="mini-stats" id="stats-display"></div>
    </div>
    
    <div class="reset-hint">איוניק 2020 | דלק 8.0 | בלאי 0.45</div>
</form>

<script>
    const feeInput = document.getElementById('fee');
    const distInput = document.getElementById('distance');
    const resultArea = document.getElementById('result-area');
    const profitDisp = document.getElementById('profit-display');
    const statusDisp = document.getElementById('status-display');
    const statsDisp = document.getElementById('stats-display');

    // קפיצה אוטומטית ברגע שהוקלדו 2 ספרות בדיוק (ללא השהייה)
    feeInput.addEventListener('input', () => {
        if (feeInput.value.length === 2) {
            distInput.focus();
        }
        calculate();
    });

    // תמיכה בכפתור "הבא" או "Enter" במקלדת הנייד
    feeInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            distInput.focus();
        }
    });

    distInput.addEventListener('input', calculate);
    distInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            distInput.blur(); // סוגר את המקלדת כדי לראות את התוצאה בגדול
        }
    });

    function calculate() {
        const fee = parseFloat(feeInput.value);
        const dist = parseFloat(distInput.value);

        if (!fee || !dist) {
            profitDisp.innerText = "--";
            statusDisp.innerText = "הזן נתונים";
            statsDisp.innerText = "";
            resultArea.style.backgroundColor = 'transparent';
            return;
        }

        const fuelCost = (dist / 20) * 8; 
        const maintCost = dist * 0.45;
        const totalExp = fuelCost + maintCost;
        const net = fee - totalExp;

        profitDisp.innerText = `₪${net.toFixed(1)}`;
        statsDisp.innerText = `הוצאות: ₪${totalExp.toFixed(1)}`;

        if (net > (fee * 0.5)) {
            resultArea.style.backgroundColor = '#1e4620';
            statusDisp.innerText = "לקחת מהר!";
        } else if (net > (fee * 0.2)) {
            resultArea.style.backgroundColor = '#463a1e';
            statusDisp.innerText = "סביר";
        } else {
            resultArea.style.backgroundColor = '#461e1e';
            statusDisp.innerText = "לא לגעת!";
        }
    }

    // סימון אוטומטי של המספר למחיקה מהירה בנגיעה
    feeInput.addEventListener('focus', () => setTimeout(() => feeInput.select(), 10));
    distInput.addEventListener('focus', () => setTimeout(() => distInput.select(), 10));

</script>

</body>
</html>
