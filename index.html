<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון כדאיות וולט - איוניק 2020</title>
    <style>
        :root {
            --wolt-blue: #00c2e8;
            --dark-gray: #202125;
            --light-gray: #f3f4f6;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--light-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark-gray);
        }

        .card {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--wolt-blue);
            margin: 0;
            font-size: 1.6rem;
        }

        .header p {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .input-box {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eef0f2;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
            background: #fdfdfd;
        }

        input:focus {
            border-color: var(--wolt-blue);
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 194, 232, 0.1);
        }

        #result-container {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box {
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            transition: background-color 0.3s;
        }

        .stats {
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 1rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
        }

        .final-profit {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 8px;
            font-weight: bold;
        }

        .footer-info {
            text-align: center;
            font-size: 0.75rem;
            color: #999;
            margin-top: 2rem;
        }

        /* סגנונות לפי מצב כדאיות */
        .status-good { background: #e8f8f0; color: var(--success); }
        .status-mid { background: #fff9e6; color: #b78a00; }
        .status-bad { background: #fef2f2; color: var(--danger); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>מחשבון רווח משלוחים</h1>
        <p>יונדאי איוניק 2020</p>
    </div>

    <div class="input-box">
        <label for="fee">סכום תשלום מהאפליקציה (₪)</label>
        <input type="number" id="fee" placeholder="כמה תקבל על המשלוח?" step="0.1" oninput="calculate()">
    </div>

    <div class="input-box">
        <label for="distance">מרחק נסיעה כולל (ק"מ)</label>
        <input type="number" id="distance" placeholder="מרחק למסעדה + ללקוח" step="0.1" oninput="calculate()">
    </div>

    <div id="result-container">
        <div id="result-box" class="result-box">
            <div class="stats">
                <div class="stat-row">
                    <span>דלק (1:20):</span>
                    <span id="fuel-val">₪0.00</span>
                </div>
                <div class="stat-row">
                    <span>בלאי, טיפולים וירידת ערך:</span>
                    <span id="maint-val">₪0.00</span>
                </div>
            </div>
            <div class="final-profit" id="profit-val">₪0.00</div>
            <div id="status-badge" class="badge"></div>
        </div>
    </div>

    <div class="footer-info">
        * מבוסס על 8 ₪ לליטר ועלות בלאי מוערכת של 0.45 ₪ לק"מ
    </div>
</div>

<script>
    function calculate() {
        const feeInput = document.getElementById('fee').value;
        const distanceInput = document.getElementById('distance').value;
        const container = document.getElementById('result-container');
        
        // אם אחד מהשדות ריק, נסתיר את התוצאה ולא נבצע חישוב
        if (!feeInput || !distanceInput) {
            container.style.display = 'none';
            return;
        }

        const fee = parseFloat(feeInput);
        const distance = parseFloat(distanceInput);

        // פרמטרים מוגדרים מראש
        const fuelPrice = 8.0;      // ש"ח לליטר
        const kmPerLiter = 20;     // צריכה ממוצעת לאיוניק
        const maintPerKm = 0.45;    // בלאי משוער לק"מ (צמיגים, ירידת ערך, טיפולים)

        // חישובים
        const fuelCost = (distance / kmPerLiter) * fuelPrice;
        const maintCost = distance * maintPerKm;
        const totalExpenses = fuelCost + maintCost;
        const netProfit = fee - totalExpenses;

        // עדכון התצוגה
        document.getElementById('fuel-val').innerText = `₪${fuelCost.toFixed(2)}`;
        document.getElementById('maint-val').innerText = `₪${maintCost.toFixed(2)}`;
        document.getElementById('profit-val').innerText = `₪${netProfit.toFixed(2)}`;
        
        const box = document.getElementById('result-box');
        const badge = document.getElementById('status-badge');
        
        container.style.display = 'block'; // הצגת התוצאה
        
        // לוגיקה לקביעת כדאיות
        box.className = 'result-box';
        if (netProfit > (fee * 0.55)) {
            box.classList.add('status-good');
            badge.innerText = "משתלם מאוד!";
        } else if (netProfit > (fee * 0.25)) {
            box.classList.add('status-mid');
            badge.innerText = "משתלם חלקית";
        } else {
            box.classList.add('status-bad');
            badge.innerText = "לא כדאי!";
        }
    }
</script>

</body>
</html>
