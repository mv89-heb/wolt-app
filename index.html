<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wolt ProCalc - Ioniq</title>
    <style>
        :root {
            --wolt-blue: #00c2e8;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: white;
            touch-action: manipulation;
        }

        .container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        label {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--wolt-blue);
        }

        input {
            background: var(--card-bg);
            border: 2px solid #333;
            border-radius: 12px;
            color: white;
            padding: 15px 5px;
            font-size: 2rem;
            text-align: center;
            font-weight: 900;
            width: 100%;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--wolt-blue);
            outline: none;
            background: #252525;
        }

        /* כפתור חזור ריק */
        .toggle-btn {
            background: var(--card-bg);
            border: 2px solid #333;
            color: #888;
            padding: 12px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .toggle-btn.active {
            background: #3d1b1b;
            border-color: var(--danger);
            color: #ff6b6b;
        }

        #result-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            margin-top: 5px;
            text-align: center;
            background: var(--card-bg);
            border: 2px solid #333;
        }

        .hourly-wage {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .profit-val {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1;
        }

        .status-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<form class="container" onsubmit="return false;">
    
    <div class="input-group">
        <label>תשלום (₪)</label>
        <input type="number" id="fee" inputmode="decimal" placeholder="00">
    </div>

    <div class="input-row">
        <div class="input-group">
            <label>מרחק (ק"מ)</label>
            <input type="number" id="distance" inputmode="decimal" placeholder="0.0">
        </div>
        <div class="input-group">
            <label>זמן (דק')</label>
            <input type="number" id="minutes" inputmode="numeric" placeholder="00">
        </div>
    </div>

    <div class="toggle-btn" id="dead-miles-btn" onclick="toggleDeadMiles()">
        🚙 דורש נסיעה חזרה ריקה? (לא)
    </div>

    <div id="result-area">
        <div class="hourly-wage" id="hourly-display">שכר שעתי: --</div>
        <div class="profit-val" id="profit-display">--</div>
        <div class="status-text" id="status-display">הזן נתונים</div>
    </div>
</form>

<script>
    const feeInput = document.getElementById('fee');
    const distInput = document.getElementById('distance');
    const minInput = document.getElementById('minutes');
    const deadMilesBtn = document.getElementById('dead-miles-btn');
    const resultArea = document.getElementById('result-area');
    const profitDisp = document.getElementById('profit-display');
    const hourlyDisp = document.getElementById('hourly-display');
    const statusDisp = document.getElementById('status-display');

    let hasDeadMiles = false;

    function toggleDeadMiles() {
        hasDeadMiles = !hasDeadMiles;
        if (hasDeadMiles) {
            deadMilesBtn.classList.add('active');
            deadMilesBtn.innerText = "🚙 דורש נסיעה חזרה ריקה? (כן)";
        } else {
            deadMilesBtn.classList.remove('active');
            deadMilesBtn.innerText = "🚙 דורש נסיעה חזרה ריקה? (לא)";
        }
        calculate();
    }

    // מעברים אוטומטיים
    feeInput.addEventListener('input', () => {
        if (feeInput.value.length === 2) distInput.focus();
        calculate();
    });

    distInput.addEventListener('input', () => {
        if (distInput.value.length >= 2) minInput.focus();
        calculate();
    });

    minInput.addEventListener('input', calculate);

    function calculate() {
        const fee = parseFloat(feeInput.value);
        const dist = parseFloat(distInput.value);
        const mins = parseFloat(minInput.value);

        if (!fee || !dist) {
            resetDisplay();
            return;
        }

        // אם יש חזור ריק, מכפילים את המרחק לצורך חישוב הוצאות
        const effectiveDist = hasDeadMiles ? dist * 2 : dist;

        const fuelCost = (effectiveDist / 20) * 8; 
        const maintCost = effectiveDist * 0.45;
        const totalExp = fuelCost + maintCost;
        
        // הפרשה תיאורטית של 10% למיסים וביטוח לאומי
        const grossProfit = fee - totalExp;
        const taxReserve = grossProfit > 0 ? grossProfit * 0.10 : 0;
        const netProfit = grossProfit - taxReserve;

        profitDisp.innerText = `₪${netProfit.toFixed(1)}`;

        // חישוב שכר שעתי (אם הוזן זמן)
        if (mins > 0) {
            const hourly = (netProfit / mins) * 60;
            hourlyDisp.innerText = `שכר שעתי: ₪${hourly.toFixed(0)}`;
        } else {
            hourlyDisp.innerText = `הוצאות נוכו: ₪${totalExp.toFixed(1)}`;
        }

        // צביעת הרקע לפי הכדאיות השעתית (או רווח נקי אם אין זמן)
        if (mins > 0) {
            const hourly = (netProfit / mins) * 60;
            if (hourly >= 65) {
                resultArea.style.backgroundColor = '#1e4620';
                statusDisp.innerText = "משתלם מאוד!";
            } else if (hourly >= 45) {
                resultArea.style.backgroundColor = '#463a1e';
                statusDisp.innerText = "סביר";
            } else {
                resultArea.style.backgroundColor = '#461e1e';
                statusDisp.innerText = "לא משתלם!";
            }
        } else {
            // אם לא הוזן זמן, נבדוק לפי היחס הישן
            if (netProfit > (fee * 0.4)) {
                resultArea.style.backgroundColor = '#1e4620';
                statusDisp.innerText = "לקחת";
            } else {
                resultArea.style.backgroundColor = '#461e1e';
                statusDisp.innerText = "גבולי / לא משתלם";
            }
        }
    }

    function resetDisplay() {
        profitDisp.innerText = "--";
        hourlyDisp.innerText = "שכר שעתי: --";
        statusDisp.innerText = "הזן נתונים";
        resultArea.style.backgroundColor = 'var(--card-bg)';
    }

    feeInput.addEventListener('focus', () => setTimeout(() => feeInput.select(), 10));
    distInput.addEventListener('focus', () => setTimeout(() => distInput.select(), 10));
    minInput.addEventListener('focus', () => setTimeout(() => minInput.select(), 10));

</script>

</body>
</html>
